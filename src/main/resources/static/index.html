<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>getMetaData · 메타데이터 추출기</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --card-2: #273449;
            --border: #334155;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-2: #0ea5e9;
            --ok: #34d399;
            --err: #f87171;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .wrap { max-width: 860px; margin: 0 auto; padding: 32px 20px 64px; }
        header h1 { margin: 0 0 4px; font-size: 26px; }
        header p { margin: 0 0 28px; color: var(--muted); }
        .tabs { display: flex; gap: 8px; margin-bottom: 18px; }
        .tab {
            flex: 1; padding: 12px; border: 1px solid var(--border);
            background: var(--card); color: var(--muted); border-radius: 10px;
            cursor: pointer; font-size: 15px; font-weight: 600; transition: .15s;
        }
        .tab.active { color: var(--text); border-color: var(--accent); background: var(--card-2); }
        .panel { display: none; }
        .panel.active { display: block; }
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px;
        }
        label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
        input[type=text], textarea {
            width: 100%; padding: 12px 14px; border-radius: 9px;
            border: 1px solid var(--border); background: #0b1220; color: var(--text);
            font-size: 14px; font-family: inherit; resize: vertical;
        }
        textarea { min-height: 180px; font-family: ui-monospace, "Cascadia Code", Consolas, monospace; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); }
        .row { display: flex; gap: 10px; align-items: center; margin-top: 14px; }
        button.go {
            padding: 11px 22px; border: none; border-radius: 9px;
            background: var(--accent-2); color: #04222e; font-weight: 700;
            font-size: 15px; cursor: pointer; transition: .15s;
        }
        button.go:hover { background: var(--accent); }
        button.go:disabled { opacity: .5; cursor: not-allowed; }
        .hint { color: var(--muted); font-size: 12px; }
        .result { margin-top: 22px; }
        .result-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .badge { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
        .badge.ok { background: rgba(52,211,153,.15); color: var(--ok); }
        .badge.err { background: rgba(248,113,113,.15); color: var(--err); }
        .badge.wait { background: rgba(148,163,184,.15); color: var(--muted); }
        pre {
            background: #0b1220; border: 1px solid var(--border); border-radius: 10px;
            padding: 16px; overflow-x: auto; margin: 0;
            font-family: ui-monospace, "Cascadia Code", Consolas, monospace; font-size: 13px;
            white-space: pre-wrap; word-break: break-all;
        }
        .k { color: var(--accent); }
        .s { color: #a5f3a0; }
        .n { color: #fbbf24; }
        .b { color: #f472b6; }
        footer { margin-top: 40px; text-align: center; color: var(--muted); font-size: 12px; }
        code { background: var(--card-2); padding: 2px 6px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <h1>🔎 getMetaData</h1>
        <p>메일 헤더 또는 URL 에서 메타데이터를 추출합니다.</p>
    </header>

    <div class="tabs">
        <button class="tab active" data-tab="url">🌐 URL</button>
        <button class="tab" data-tab="mail">✉️ 메일 헤더</button>
    </div>

    <!-- URL 패널 -->
    <div class="panel active" id="panel-url">
        <div class="card">
            <label for="urlInput">추출할 URL</label>
            <input type="text" id="urlInput" placeholder="https://example.com" value="https://example.com">
            <div class="row">
                <button class="go" id="urlBtn">추출하기</button>
                <span class="hint">페이지 제목 · 설명 · Open Graph · Twitter Card 등을 수집합니다.</span>
            </div>
        </div>
    </div>

    <!-- 메일 헤더 패널 -->
    <div class="panel" id="panel-mail">
        <div class="card">
            <label for="mailInput">메일 헤더 원문 (또는 전체 메일)</label>
            <textarea id="mailInput" placeholder="From: ...&#10;To: ...&#10;Subject: ...">From: Alice <alice@example.com>
To: bob@example.com
Subject: =?UTF-8?B?7JWI64WV7ZWY7IS47JqU?=
Date: Mon, 5 Jul 2026 10:00:00 +0900
Message-ID: <abc123@example.com>
Received: from mx1.example.com by mx2.example.com</textarea>
            <div class="row">
                <button class="go" id="mailBtn">추출하기</button>
                <span class="hint">From/To/Subject, 전달 경로(Received), 인증(SPF/DKIM) 등을 파싱합니다.</span>
            </div>
        </div>
    </div>

    <!-- 결과 -->
    <div class="result" id="result" style="display:none">
        <div class="result-head">
            <strong>결과</strong>
            <span class="badge wait" id="badge">대기</span>
            <span class="hint" id="status"></span>
        </div>
        <pre id="output"></pre>
    </div>

    <footer>
        POST <code>/api/metadata/url</code> · <code>/api/metadata/mail-header</code> — Spring Boot + Python
    </footer>
</div>

<script>
    // 탭 전환
    document.querySelectorAll('.tab').forEach(function (t) {
        t.addEventListener('click', function () {
            document.querySelectorAll('.tab').forEach(function (x) { x.classList.remove('active'); });
            document.querySelectorAll('.panel').forEach(function (x) { x.classList.remove('active'); });
            t.classList.add('active');
            document.getElementById('panel-' + t.dataset.tab).classList.add('active');
        });
    });

    // JSON 구문 색칠
    function highlight(json) {
        return json
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?/g, function (m) {
                return '<span class="' + (/:$/.test(m) ? 'k' : 's') + '">' + m + '</span>';
            })
            .replace(/\b(true|false|null)\b/g, '<span class="b">$1</span>')
            .replace(/\b(-?\d+(?:\.\d+)?)\b/g, '<span class="n">$1</span>');
    }

    function show(badgeClass, badgeText, statusText, bodyText) {
        document.getElementById('result').style.display = 'block';
        var badge = document.getElementById('badge');
        badge.className = 'badge ' + badgeClass;
        badge.textContent = badgeText;
        document.getElementById('status').textContent = statusText;
        var out = document.getElementById('output');
        try {
            out.innerHTML = highlight(JSON.stringify(JSON.parse(bodyText), null, 2));
        } catch (e) {
            out.textContent = bodyText;
        }
    }

    async function call(url, options, btn) {
        btn.disabled = true;
        show('wait', '요청 중…', '', '');
        document.getElementById('output').textContent = '⏳ 추출 중입니다...';
        try {
            var res = await fetch(url, options);
            var text = await res.text();
            show(res.ok ? 'ok' : 'err',
                 res.ok ? '성공 ' + res.status : '실패 ' + res.status,
                 url, text);
        } catch (e) {
            show('err', '네트워크 오류', url, String(e));
        } finally {
            btn.disabled = false;
        }
    }

    document.getElementById('urlBtn').addEventListener('click', function () {
        var v = document.getElementById('urlInput').value.trim();
        call('/api/metadata/url', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ value: v })
        }, this);
    });

    document.getElementById('mailBtn').addEventListener('click', function () {
        var v = document.getElementById('mailInput').value;
        call('/api/metadata/mail-header', {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain; charset=utf-8' },
            body: v
        }, this);
    });
</script>
</body>
</html>
